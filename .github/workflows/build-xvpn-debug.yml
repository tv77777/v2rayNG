name: Build XVPN Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Prepare Libs Directory
        run: mkdir -p ${{ github.workspace }}/V2rayNG/app/libs

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.11
        with:
          repository: '2dust/AndroidLibXrayLite'
          latest: true
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Build with Gradle
        run: |
          cd ${{ github.workspace }}/V2rayNG
          chmod +x gradlew
          # بناء التطبيق مع تحديد نسخة المعالج الأكثر شيوعاً لتقليل الحجم
          ./gradlew clean assembleDebug \
            -Pandroid.ndkVersion="29.0.14206865" \
            -Pandroid.newDsl=false

      - name: Upload Small Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: XVPN-Small-APK
          # الحل الخبير: اختيار ملف الـ APK المخصص لمعالجات arm64 فقط لتقليل الحجم
          path: |
            **/build/outputs/apk/**/app-arm64-v8a-debug.apk
            **/build/outputs/apk/**/app-universal-debug.apk
          if-no-files-found: error
