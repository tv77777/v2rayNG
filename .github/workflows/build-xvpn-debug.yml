name: Build XVPN Optimized APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Prepare Libs Directory
        run: mkdir -p ${{ github.workspace }}/V2rayNG/app/libs

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.11
        with:
          repository: '2dust/AndroidLibXrayLite'
          latest: true
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Build with Gradle
        run: |
          cd ${{ github.workspace }}/V2rayNG
          chmod +x gradlew
          # بناء نسخة Debug مع تمرير الإعدادات اللازمة
          ./gradlew clean assembleDebug \
            -Pandroid.ndkVersion="29.0.14206865" \
            -Pandroid.newDsl=false

      - name: Collect and Rename APK
        # هذا الجزء هو الأهم: يبحث عن الملف، يغير اسمه، ويضعه في مكان مضمون
        run: |
          mkdir -p final_output
          # البحث عن أي ملف APK ناتج (نركز على arm64-v8a أولاً لصغر الحجم)
          APK_PATH=$(find ${{ github.workspace }} -name "*arm64-v8a-debug.apk" | head -n 1)
          
          # إذا لم يجد arm64، يبحث عن أي APK آخر
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find ${{ github.workspace }} -name "*.apk" | head -n 1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "خطأ: لم يتم العثور على أي ملف APK!"
            exit 1
          fi
          
          echo "تم العثور على الملف في: $APK_PATH"
          cp "$APK_PATH" final_output/XVPN-Lite.apk
          echo "حجم الملف النهائي:"
          ls -lh final_output/XVPN-Lite.apk

      - name: Upload Lite APK
        uses: actions/upload-artifact@v4
        with:
          name: XVPN-Lite-App
          # نرفع فقط الملف الذي قمنا بتجهيزه وتسميته
          path: final_output/XVPN-Lite.apk
          if-no-files-found: error
